name: Refresh tournament data

on:
  schedule:
    # Three times daily at 02:00, 10:00, 18:00 UTC — keeps the dashboard fresh
    # through the group stage (matches most days). GitHub cron is ALWAYS UTC and
    # may be delayed a few minutes under load.
    - cron: "0 2,10,18 * * *"
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

# Allow the built-in GITHUB_TOKEN to push the refreshed data back to the repo.
permissions:
  contents: write

# Never let two refreshes overlap (queued, not cancelled, so none are lost).
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Job-level so the optional deploy-hook step can read it in its `if:`.
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run refresh pipeline (Elo → results → recompute)
        env:
          # Read by fetch_api_results.py via os.environ — no .env file needed.
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/refresh_data.py

      - name: Commit & push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/team_momentum.json scripts/results.csv scripts/elo_ratings.csv
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): automated refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Trigger Vercel deploy (optional fallback)
        # Only runs if you've set the VERCEL_DEPLOY_HOOK_URL secret. Usually
        # unnecessary — Vercel's GitHub integration already deploys on push.
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        run: |
          echo "Pinging Vercel deploy hook…"
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
